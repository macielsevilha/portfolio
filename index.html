<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            font-family: monospace;
            color: rgb(95, 4, 123);
        }
        
        .header-v1-content-wrap {
            width: 100%;
            max-width: 1200px;
            background-color: black;
            height: 80px;
            margin: auto;
        }
        
        .header-v1-menuLogo {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0px 30px;
        }
        
        .header-v1-menuLogo h3 {
            font-size: 25px;
        }
        
        .header-v1-nav li {
            display: inline-block;
            padding: 15px;
        }
        
        .header-v1-nav li a {
            text-decoration: none;
            color: seashell;
        }
        
        .main-v1-content-wrap {
            width: 100%;
            max-width: 1000px;
            margin: auto;
            background-image: url('./img/linha-removebg-preview.png');
            background-size: cover;
        }
        
        .main-v1-perfil-wrap {
            display: flex;
            margin-top: 40px;
        }
        
        .main-v1-perfil-texto {
            padding: 30px;
            text-align: center;
        }
        
        .main-v1-perfil-texto h1 {
            font-size: 45px;
        }
        
        .main-v1-perfil-texto p {
            font-size: 15px;
        }
        
        .main-v1-perfil-image {
            border: solid 2px rgb(94, 19, 164);
            height: 300px;
            width: 300px;
            padding: 10px;
            border-radius: 100px;
        }
        
        .main-v1-perfil-image img {
            width: 300px;
            border-radius: 90px;
        }
    </style>
</head>

<body>

    <header class="header-v1-content-wrap">

        <div class="header-v1-menuLogo">
            <div class="header-v1-logoTipo">
                <h3>_dev <span>Maciel</span></h3>
            </div>
            <div class="header-v1-menu">
                <ul class="header-v1-nav">
                    <li><a href="">Home</a></li>
                    <li><a href="">Contato</a></li>
                    <li><a href="">Projetos</a></li>
                    <li><a href="">Sobre</a></li>
                </ul>
            </div>
        </div>

    </header>

    <main class="main-v1-content-wrap">

        <section class="main-v1-perfil">
            <div class="main-v1-perfil-wrap">
                <div class="main-v1-perfil-texto">
                    <h1>Sou um developer web</h1>
                    <p>Olá, me chamo Maciel Sevilha, e sou um progrmador web com orgulho dessa profissão tão maravilhosa, sou apaixonado em programmation desde dos 17 anos de idade, atualmente tenho 20 anos.
                    </p>
                </div>
                <div class="main-v1-perfil-image">
                    <img src="./img/foto.jpg" alt="">
                </div>
            </div>
        </section>

        <section class="main-v1-habilidade">

            <div class="main-v1-habilidade-titulo">
                <h2>Tenho conhecimento bastante</h2>
            </div>
            <div class="main-v1-habilidade-bloco">
                <div class="main-v1-habilidade-bloco__v1">

                </div>
            </div>

        </section>



    </main>





</body>

</html>
